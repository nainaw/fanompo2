<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fandaharana Masina</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 20px;
        }
        .pdf-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .download-btn {
            background-color: var(--primary);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 6px solid var(--primary);
        }
        .card h3 {
            margin: 0 0 15px 0;
            color: var(--accent);
            font-size: 1.3rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .date-row:last-child {
            border-bottom: none;
        }
        .date-text {
            color: #555;
            font-weight: 500;
        }
        .name-text {
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fandaharana</h1>
        
        <div class="pdf-section">
            <a href="fandaharana.pdf" target="_blank" class="download-btn">
                📥 Haka ny PDF (Tableau)
            </a>
        </div>

        <div id="content">
            <div id="loading">Eo am-pamoahana ny fandaharana...</div>
        </div>
    </div>

    <script>
        // Updated to your new filename
        const csvUrl = 'schedule.csv?v=' + Date.now();

        async function loadData() {
            const content = document.getElementById('content');
            try {
                const res = await fetch(csvUrl);
                if (!res.ok) throw new Error("Tsy hita ny schedule.csv");
                
                const text = await res.text();
                // Improved CSV parsing to handle different line endings and spaces
                const rows = text.split(/\r?\n/)
                                .filter(r => r.trim() !== "")
                                .map(r => r.split(',').map(cell => cell.trim()));

                if (rows.length < 2) {
                    content.innerHTML = "Tsy misy angona azo aseho.";
                    return;
                }

                content.innerHTML = '';
                const headers = rows[0]; // Dates

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[0] || row[0] === "") continue;

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let html = `<h3>${row[0]}</h3>`;
                    
                    // Look at your 3 Saturday columns
                    for (let j = 1; j < headers.length; j++) {
                        if (headers[j] && headers[j] !== "") {
                            html += `
                                <div class="date-row">
                                    <span class="date-text">${headers[j]}</span>
                                    <span class="name-text">${row[j] || '---'}</span>
                                </div>`;
                        }
                    }
                    card.innerHTML = html;
                    content.appendChild(card);
                }
            } catch (err) {
                content.innerHTML = `<div style="text-align:center; color:red; padding:20px;">
                    Hadisoana: Tsy afaka mampiseho ny fandaharana.<br>
                    Jereo ny PDF eo ambony.
                </div>`;
            }
        }
        loadData();
    </script>
</body>
</html>
