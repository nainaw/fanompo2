<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fandaharana</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #2980b9;
            --bg: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            color: #333;
            line-height: 1.5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin: 10px 0 20px 0;
        }
        .pdf-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .download-btn {
            background-color: var(--primary);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        /* Mobile-First Date Cards */
        .date-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid #eee;
        }
        .date-header {
            background: #f1f3f5;
            color: var(--primary);
            padding: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            border-bottom: 2px solid #dee2e6;
            border-radius: 12px 12px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .task-list {
            padding: 5px 15px;
        }
        .assignment-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #f1f1f1;
            align-items: center;
        }
        .assignment-row:last-child {
            border-bottom: none;
        }
        .task-name {
            flex: 1;
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
            padding-right: 10px;
        }
        .member-name {
            flex: 1.5;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.95rem;
            text-align: right;
            word-wrap: break-word;
        }
        #loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fandaharana Masina</h1>
        
        <div class="pdf-section">
            <a href="fandaharana.pdf" target="_blank" class="download-btn">
                📥 Haka ny PDF (Pirinty)
            </a>
        </div>

        <div id="content">
            <div id="loading">Eo am-pamoahana ny fandaharana...</div>
        </div>
    </div>

    <script>
        const csvUrl = 'schedule.csv?v=' + Date.now();

        async function renderMobilePlanning() {
            const content = document.getElementById('content');
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                // Handle various line endings and clean up commas/spaces
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").map(r => r.split(',').map(c => c.trim()));

                if (rows.length < 2) return;

                const headers = rows[0]; 
                const tasks = rows.slice(1);

                content.innerHTML = '';

                // Create 1 Card per Date Column
                for (let col = 1; col < headers.length; col++) {
                    if (!headers[col]) continue;

                    const card = document.createElement('div');
                    card.className = 'date-card';
                    
                    let html = `<div class="date-header">${headers[col]}</div>`;
                    html += `<div class="task-list">`;

                    tasks.forEach(row => {
                        const taskName = row[0];
                        const member = row[col] || "---";
                        
                        if (taskName) {
                            html += `
                                <div class="assignment-row">
                                    <span class="task-name">${taskName}</span>
                                    <span class="member-name">${member}</span>
                                </div>`;
                        }
                    });

                    html += `</div>`;
                    card.innerHTML = html;
                    content.appendChild(card);
                }
            } catch (err) {
                content.innerHTML = "<p style='text-align:center;'>Misy olana kely ny tranonkala...</p>";
            }
        }
        renderMobilePlanning();
    </script>
</body>
</html>
